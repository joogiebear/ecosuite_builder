name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build & publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing tag: $TAG"

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            echo "Bump package.json to match the tag, or tag the commit that has the matching version."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build installer & zip
        run: npm run dist

      - name: List build artifacts
        shell: bash
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: EcoSuite Builder ${{ steps.tag.outputs.name }}
          files: release/EcoSuite-Builder-*-win64.zip
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
